name: Sync to HuggingFace Space

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ashishsankhuapg@gmail.com"
          git config --global user.name "Ashish Sankhua"
          git remote add hf https://ashishsankhua:${HF_TOKEN}@huggingface.co/spaces/ashishsankhua/investor-ops-intelligence-suite
          git push hf main --force
