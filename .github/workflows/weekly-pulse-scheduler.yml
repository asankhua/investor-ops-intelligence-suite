name: Weekly Pulse Scheduler

on:
  schedule:
    # Every Saturday 04:30 UTC (10:00 AM IST)
    - cron: "30 4 * * 6"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-weekly-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r phase2_weeklyPulse/requirements.txt

      - name: Refresh weekly pulse from Play Store
        env:
          # Prefer repo secret/variable if provided; fallback handled by script.
          PLAYSTORE_REVIEW_URLS: ${{ secrets.PLAYSTORE_REVIEW_URLS }}
          PLAYSTORE_REVIEW_COUNT: "100"
          PLAYSTORE_LANG: "en"
          PLAYSTORE_COUNTRY: "in"
        run: python scripts/run_weekly_pulse_refresh.py

      - name: Commit and push updates (if any)
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/reviews/ phase2_weeklyPulse/data/
          git commit -m "chore: weekly pulse refresh from Play Store"
          git push
